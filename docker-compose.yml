version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ransomware_db
    environment:
      POSTGRES_DB: ransomware_shield
      POSTGRES_USER: ransomware_user
      POSTGRES_PASSWORD: ransomware_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ransomware_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ransomware_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=ransomware_shield
      - DB_USER=ransomware_user
      - DB_PASS=ransomware_password
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    container_name: ransomware_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=ransomware_shield
      - DB_USER=ransomware_user
      - DB_PASS=ransomware_password
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build: ./frontend
    container_name: ransomware_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
